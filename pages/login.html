<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THUNDER SHOES - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="../css/login.css"> <!-- Enlace al archivo CSS externo -->
</head>

<body>

  <header>
    <nav>
      <a href="../index.html" class="logo">
  <img src="../imagenes/Logo.png" alt="Logo de la empresa" style="height: 50px;">
</a>
      <div class="titulo">THUNDER SHOES</div>
      <ul class="nav-links">
          <li><a class="link" href="../pages/registro.html">Registrarse</a></li>
          <li><a class="link" href="../pages/login.html">Login</a></li>
          <li><a href="#ayuda">Ayuda</a></li>
          <li class="carrito-li">
              <div class="carrito-container" id="carrito">
                  <a href="#carrito">
                      <div class="carrito-icon">
                          <i class="fas fa-shopping-cart"></i>
                      </div>
                      <div class="contador-items">0</div>
                  </a>
                  
                  <div class="carrito-dropdown">
                      <h3>Tu carrito</h3>
                      <div class="carrito-items">
                          <!-- Los items del carrito se añadirán dinámicamente con JavaScript -->
                          <div class="carrito-vacio">Tu carrito está vacío</div>
                      </div>
                      <div class="carrito-total">
                          <span>Total:</span>
                          <span>$0</span>
                      </div>
                      <button class="boton-checkout">Finalizar compra</button>
                  </div>
              </div>
          </li>
      </ul>
  </nav>
  </header>

  <main>
    <form action="#" method="post" class="form-inicio-sesion">
      <h2>INICIO DE SESIÓN</h2>
      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email-login" placeholder="Ingresa tu correo electrónico">
      </div>
      <div class="input-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password-login" required>
      <i class="fas fa-eye toggle-password" id="toggleLogin"></i>
      </div>
      <div class="botones">
        <button type="submit" class="btn">Ingresar</button>
        <a href="../pages/registro.html" class="btn secundario">Registrarse</a>
      </div>
    </form>
  </main>
    <script src="../js/login.js"></script>
    <script src="../js/registro.js"></script>
</body>
</html>
