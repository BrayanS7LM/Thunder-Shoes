<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Roboto:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/registro.css">

    <title>THUNDER SHOES</title>
</head>

<body>

<header>
    <nav>
        <a href="../index.html" class="logo">
            <img src="../imagenes/Logo.png" alt="Logo de la empresa" style="height: 50px;">
        </a>

        <div class="titulo">THUNDER SHOES</div>

        <ul class="nav-links">
            <li><a class="link" href="../pages/registro.html">Registrarse</a></li>
            <li><a class="link" href="../pages/login.html">Login</a></li>
            <li><a href="#ayuda">Ayuda</a></li>

            <li class="carrito-li">
                <div class="carrito-container" id="carrito">
                    <a href="#carrito">
                        <div class="carrito-icon">
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                        <div class="contador-items">0</div>
                    </a>

                    <div class="carrito-dropdown">
                        <h3>Tu carrito</h3>
                        <div class="carrito-items">
                            <div class="carrito-vacio">Tu carrito está vacío</div>
                        </div>
                        <div class="carrito-total">
                            <span>Total:</span>
                            <span>$0</span>
                        </div>
                        <button class="boton-checkout">Finalizar compra</button>
                    </div>
                </div>
            </li>
        </ul>
    </nav>
</header>

<div class="form-container" id="registro">
    <h2>Crear una cuenta</h2>

    <form>
        <!-- Nombre -->
        <div class="input-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre completo" required>
            <i class="fas fa-user icon"></i>
        </div>

        <!-- Email -->
        <div class="input-group">
            <label for="email-registro">Correo electrónico</label>
            <input type="email" id="email-registro" name="email" placeholder="ejemplo@correo.com" required>
            <i class="fas fa-envelope icon"></i>
        </div>

        <!-- Teléfono -->
        <div class="input-group">
            <label for="telefono-registro">Teléfono</label>
            <input type="tel" id="telefono-registro" name="telefono" placeholder="Ingresa tu número de contacto" required>
            <i class="fas fa-phone icon"></i>
        </div>

        <!-- Contraseña -->
        <div class="input-group password-group">
            <label for="password-registro">Contraseña</label>
            <input type="password" id="password-registro" name="password" placeholder="Mínimo 8 caracteres" required>
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
        </div>

        <!-- Confirmar contraseña -->
        <div class="input-group password-group">
            <label for="confirmar-password">Confirmar contraseña</label>
            <input type="password" id="confirmar-password" name="confirmar-password" placeholder="Repite tu contraseña" required>
            <i class="fas fa-eye toggle-password" id="toggleConfirmar"></i>
        </div>
       <!-- terminos y condiciones --> 
        <div class="checkbox-group">
        <input type="checkbox" id="terminos" name="terminos" required>
        <label for="terminos">
        Acepto los <a href="terminos.html" target="_blank" style="color: #011526; font-weight: bold; text-decoration: underline;">términos y condiciones</a>
        </label>
        </div>

        <!-- Botón -->
        <button type="submit" class="btn">Registrarme</button>

        <!-- Footer -->
        <div class="form-footer">
            ¿Ya tienes una cuenta? <a href="login.html">Iniciar sesión</a>
        </div>
    </form>
</div>

<!-- JS -->
<script src="../js/registro.js"></script>

</body>
</html>
